apiVersion: apps/v1
kind: Deployment
metadata:
  name: axion-frontend
  namespace: axion
  labels:
    app: axion-frontend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: axion-frontend
  template:
    metadata:
      labels:
        app: axion-frontend
    spec:
      containers:
        - name: axion-frontend
          image: krishanand01/axion-frontend:v1.2.11
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "5m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "512Mi"
          volumeMounts:
            - name: env-file
              mountPath: /etc/axion/frontend.env
              subPath: env
      volumes:
        - name: env-file
          secret:
            secretName: axion-frontend-env
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: axion-backend
  namespace: axion
  labels:
    app: axion-backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: axion-backend
  template:
    metadata:
      labels:
        app: axion-backend
    spec:
      containers:
        - name: axion-backend
          image: krishanand01/axion-backend:v1.2.11
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "5m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "512Mi"
          volumeMounts:
            - name: env-file
              mountPath: /app/apps/backend/.env
              subPath: env
            - name: gcp-key-volume
              mountPath: /app/apps/backend/vm-manager.json
              subPath: vm-manager.json
              readOnly: true
      volumes:
        - name: env-file
          secret:
            secretName: axion-backend-env
        - name: gcp-key-volume
          secret:
            secretName: gcp-key-secret

