apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: axion
  namespace: argocd

  labels:
    app.kubernetes.io/name: axion
    app.kubernetes.io/part-of: axion-platform

  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  source:
    repoURL: https://github.com/Official-Krish/Axion

    targetRevision: main

    path: ops

  destination:
    server: https://kubernetes.default.svc
    namespace: axion

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    retry:
      limit: 5

      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true

  revisionHistoryLimit: 10

  info:
    - name: Environment
      value: production

    - name: Project
      value: axion

    - name: Managed-By
      value: argocd
